<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتا خلاط؟ 👿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0000 0%, #1a0000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            background: #050000;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.4);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 1;
            border: 2px solid #8b0000;
        }

        h1 {
            font-size: 3rem;
            color: #8b0000;
            margin-bottom: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .question {
            font-size: 4rem;
            color: #ffffff;
            margin-bottom: 3rem;
            font-weight: bold;
            animation: pulse 2s infinite;
            text-shadow: 0 0 25px #ff0000;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 25px #ff0000; }
            50% { transform: scale(1.05); text-shadow: 0 0 50px #ff3300; }
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            position: relative;
        }

        .btn {
            padding: 1rem 3rem;
            font-size: 2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 150px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .btn-yes {
            background: linear-gradient(135deg, #8b0000 0%, #4a0000 100%);
            color: white;
            border: 2px solid #000000;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.8);
            background: linear-gradient(135deg, #a52a2a 0%, #5c0000 100%);
        }

        .btn-no {
            background: linear-gradient(135deg, #3a0000 0%, #1f0000 100%);
            color: #ff6666;
            position: relative;
            transition: all 0.2s ease;
            border: 2px solid #8b0000;
            text-shadow: 0 0 8px #ff0000;
        }

        .btn-no:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #4d0000 0%, #2d0000 100%);
            color: #ff9999;
        }

        .message {
            margin-top: 2rem;
            font-size: 2.5rem;
            color: #ff0000;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
            text-shadow: 0 0 20px #ff3333;
        }

        .message.show {
            opacity: 1;
            transform: scale(1);
        }

        .devils {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .devil {
            position: absolute;
            font-size: 2rem;
            animation: floatDevil 8s linear infinite;
            opacity: 0.5;
            filter: drop-shadow(0 0 8px #ff0000);
            transform-origin: center;
        }

        @keyframes floatDevil {
            0% { 
                transform: translateY(100vh) rotate(0deg) scale(0.8); 
                opacity: 0.3; 
            }
            50% { 
                transform: translateY(50vh) rotate(180deg) scale(1.2); 
                opacity: 0.7; 
            }
            100% { 
                transform: translateY(-100px) rotate(360deg) scale(0.8); 
                opacity: 0; 
            }
        }

        /* نار متحركة في الخلفية */
        .fire-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.1) 0%, transparent 70%);
            animation: firePulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes firePulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); background: radial-gradient(circle at 50% 50%, rgba(255, 68, 68, 0.2) 0%, transparent 70%); }
        }

        /* شرائط نارية */
        .fire-stripe {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff0000, #8b0000, #ff0000, transparent);
            animation: fireStripe 4s linear infinite;
            filter: blur(1px);
        }

        @keyframes fireStripe {
            0% { transform: translateX(-100%) scaleX(1); opacity: 0.5; }
            50% { transform: translateX(0) scaleX(1.5); opacity: 1; }
            100% { transform: translateX(100%) scaleX(1); opacity: 0.5; }
        }

        .fire-stripe-top {
            top: 15%;
        }

        .fire-stripe-bottom {
            bottom: 15%;
        }

        .fire-stripe-left {
            left: 10%;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #ff0000, #8b0000, #ff0000, transparent);
            animation: fireStripeVertical 4s linear infinite;
        }

        .fire-stripe-right {
            right: 10%;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #ff0000, #8b0000, #ff0000, transparent);
            animation: fireStripeVertical 4s linear infinite;
        }

        @keyframes fireStripeVertical {
            0% { transform: translateY(-100%) scaleY(1); opacity: 0.5; }
            50% { transform: translateY(0) scaleY(1.5); opacity: 1; }
            100% { transform: translateY(100%) scaleY(1); opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .question {
                font-size: 3rem;
            }
            
            .btn {
                padding: 0.8rem 2rem;
                font-size: 1.5rem;
                min-width: 120px;
            }
            
            .message {
                font-size: 1.8rem;
            }
            
            .devil {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- تأثيرات نارية -->
    <div class="fire-effect"></div>
    <div class="fire-stripe fire-stripe-top"></div>
    <div class="fire-stripe fire-stripe-bottom"></div>
    <div class="fire-stripe fire-stripe-left"></div>
    <div class="fire-stripe fire-stripe-right"></div>
    
    <div class="devils" id="devils"></div>
    
    <div class="container">
        <h1>👿 سؤال شيطاني 👿</h1>
        <div class="question">نتا خلاط؟ 🔥</div>
        
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">نعم 🔥</button>
            <button class="btn btn-no" id="noBtn">لا 👿</button>
        </div>
        
        <div class="message" id="message">كان عمبالي بيك 🔥👿</div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const message = document.getElementById('message');
        const devilsContainer = document.getElementById('devils');

        // أشكال شياطين مختلفة
        const devilShapes = [
            '👿', '😈', '👹', '👺', '💀', '🔥', '⚡', '🌋', '😈', '👿', 
            '👹', '👺', '💀', '🔥', '😈', '👿', '👹', '💀', '🔥', '⚡'
        ];

        // رسائل شيطانية
        const funnyMessages = [
            "👿 مستحيل تهرب!",
            "🔥 في النار يا هارب!",
            "😈 الشيطان معايا!",
            "💀 لا للجبناء!",
            "⚡ هتعذب كتير!",
            "🌋 نار جهنم!",
            "👺 مش هتنجح!",
            "🔥 هتلاقيني كمان!"
        ];

        // دالة لإنشاء شياطين متطايرة
        function createDevil() {
            const devil = document.createElement('div');
            devil.classList.add('devil');
            
            // اختيار شكل شيطان عشوائي
            const randomDevil = devilShapes[Math.floor(Math.random() * devilShapes.length)];
            devil.innerHTML = randomDevil;
            
            devil.style.left = Math.random() * 100 + '%';
            devil.style.animationDuration = Math.random() * 4 + 5 + 's';
            devil.style.fontSize = Math.random() * 2 + 1.5 + 'rem';
            devil.style.animationDelay = Math.random() * 5 + 's';
            
            devilsContainer.appendChild(devil);

            setTimeout(() => {
                devil.remove();
            }, 10000);
        }

        // إنشاء شياطين كل نصف ثانية
        setInterval(createDevil, 500);

        // وظيفة زر "لا" الهارب
        noBtn.addEventListener('mouseenter', function(e) {
            // إضافة صوت شيطاني وهمي (تأثير بصري)
            createDevil(); // شيطان سريع عند الهروب
            
            // الحصول على أبعاد الشاشة والزر
            const btnRect = this.getBoundingClientRect();
            
            // حساب المساحة المتاحة
            const maxX = window.innerWidth - btnRect.width - 20;
            const maxY = window.innerHeight - btnRect.height - 20;
            
            // منع الزر من الخروج عن حدود الشاشة
            const randomX = Math.min(Math.max(20, Math.random() * maxX), maxX - 20);
            const randomY = Math.min(Math.max(20, Math.random() * maxY), maxY - 20);
            
            // تغيير موقع الزر بشكل مطلق
            this.style.position = 'fixed';
            this.style.left = randomX + 'px';
            this.style.top = randomY + 'px';
            this.style.zIndex = '1000';
            this.style.borderColor = '#ff4444';
            
            // تغيير النص لرسالة عشوائية
            const randomMessage = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            this.textContent = randomMessage;
            
            // إرجاع النص الأصلي بعد ثانية
            setTimeout(() => {
                this.textContent = 'لا 👿';
                this.style.borderColor = '#8b0000';
            }, 800);
        });

        // عندما يتمكن المستخدم أخيراً من الضغط على لا
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // إنشاء انفجار من الشياطين
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createDevil();
                }, i * 50);
            }
            
            // تأثير ناري
            document.body.style.background = 'linear-gradient(135deg, #2d0000 0%, #4d0000 100%)';
            document.querySelector('.container').style.borderColor = '#ff4444';
            document.querySelector('.container').style.boxShadow = '0 0 80px #ff0000';
            
            alert('👿 هاهاها! أنت تحترق! 👿');
            
            setTimeout(() => {
                document.body.style.background = 'linear-gradient(135deg, #0a0000 0%, #1a0000 100%)';
                document.querySelector('.container').style.borderColor = '#8b0000';
                document.querySelector('.container').style.boxShadow = '0 20px 60px rgba(255, 0, 0, 0.4)';
            }, 500);
        });

        // وظيفة زر نعم
        yesBtn.addEventListener('click', function() {
            // إظهار الرسالة
            message.classList.add('show');
            
            // إخفاء أزرار الاختيار
            document.querySelector('.buttons').style.opacity = '0.5';
            noBtn.style.display = 'none';
            yesBtn.disabled = true;
            yesBtn.style.opacity = '0.7';
            yesBtn.style.cursor = 'default';
            
            // إنشاء انفجار شيطاني كبير
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createDevil();
                }, i * 30);
            }
            
            // تغيير لون الخلفية لون ناري
            document.body.style.background = 'linear-gradient(135deg, #4d0000 0%, #8b0000 100%)';
            
            // تأثير ناري مكثف
            document.body.style.boxShadow = 'inset 0 0 150px #ff3300';
            
            // تأثير على الحاوية
            document.querySelector('.container').style.borderColor = '#ff6666';
            document.querySelector('.container').style.boxShadow = '0 0 100px #ff3300';
            
            // تغيير النص في الحاوية
            document.querySelector('h1').innerHTML = '🔥 تم التعذيب بنجاح 🔥';
        });

        // منع الضغط على لا عن طريق الخطأ على الشاشات اللمس
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            
            const randomX = Math.random() * (window.innerWidth - 100);
            const randomY = Math.random() * (window.innerHeight - 100);
            
            this.style.position = 'fixed';
            this.style.left = randomX + 'px';
            this.style.top = randomY + 'px';
            this.style.borderColor = '#ff4444';
            
            const randomMessage = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            this.textContent = randomMessage;
            
            // إنشاء شيطان عند اللمس
            createDevil();
            
            setTimeout(() => {
                this.textContent = 'لا 👿';
                this.style.borderColor = '#8b0000';
            }, 800);
        });

        // إضافة شياطين عند حركة الماوس
        document.addEventListener('mousemove', function(e) {
            if(Math.random() < 0.02) { // 2% chance لخلق شيطان عند حركة الماوس
                createDevil();
            }
        });

        // منع المستخدم من الغش
        window.addEventListener('resize', function() {
            if(noBtn.style.position === 'fixed') {
                const btnRect = noBtn.getBoundingClientRect();
                if(btnRect.right > window.innerWidth) {
                    noBtn.style.left = (window.innerWidth - btnRect.width - 20) + 'px';
                }
                if(btnRect.bottom > window.innerHeight) {
                    noBtn.style.top = (window.innerHeight - btnRect.height - 20) + 'px';
                }
            }
        });

        // إضافة شياطين عند البداية
        for(let i = 0; i < 15; i++) {
            setTimeout(() => {
                createDevil();
            }, i * 200);
        }
    </script>
</body>
</html>
